<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="루틴" />
<title>루틴</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" type="image/png" href="/icons/icon-96.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  .safe-top { padding-top: max(1.5rem, env(safe-area-inset-top)); }

  /* 상단 영역 */
  .header {
    background: #fff;
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid #eee;
  }
  .date-label { font-size: 13px; color: #888; margin-bottom: 4px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: 22px; font-weight: 600; }
  .refresh-btn {
    width: 34px; height: 34px; border: none; background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; color: #bbb;
  }
  .refresh-btn:active { background: #f0f0f0; }

  /* 스트릭 카드 */
  .streak-card {
    margin: 1rem 1rem 0;
    background: #fff;
    border-radius: 16px;
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border: 1px solid #eee;
  }
  .streak-left { font-size: 38px; line-height: 1; }
  .streak-num { font-size: 30px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .streak-label { font-size: 13px; color: #888; margin-top: 2px; }
  .streak-sub { font-size: 12px; color: #aaa; margin-top: 3px; }

  /* 드래그 핸들 */
  .drag-handle {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: #ccc; cursor: grab; flex-shrink: 0;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .check-item.dragging { opacity: 0.35; }
  .check-item.drag-over { box-shadow: inset 0 2px 0 #1D9E75; }

  /* 진행률 */
  .progress-wrap { margin: 1rem 1rem 0; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-title { font-size: 13px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-count { font-size: 13px; color: #aaa; }
  .progress-bar { height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.35s ease; }

  /* 완료 배너 */
  .done-banner {
    display: none;
    margin: 0.75rem 1rem 0;
    background: #E1F5EE;
    border: 1px solid #9FE1CB;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    color: #0F6E56;
    font-weight: 500;
    text-align: center;
  }

  /* 체크리스트 */
  .checklist {
    margin: 0.75rem 1rem 0;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #eee;
    overflow: hidden;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item:active { background: #f9f9f9; }
  .check-item.editing { cursor: default; background: #fafafa; }

  .checkbox {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .check-item.checked .checkbox { background: #1D9E75; border-color: #1D9E75; }
  .check-icon { display: none; }
  .check-item.checked .check-icon { display: block; }

  .item-text {
    flex: 1; font-size: 15px; color: #1a1a1a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.15s;
    min-width: 0;
  }
  .check-item.checked .item-text { color: #bbb; text-decoration: line-through; }
  .item-edit-input {
    flex: 1; font-size: 15px; font-family: inherit;
    background: transparent; border: none; outline: none;
    color: #1a1a1a; padding: 0; min-width: 0;
  }

  .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn {
    width: 32px; height: 32px; border: none; background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; color: #bbb;
    transition: background 0.1s, color 0.1s;
  }
  .icon-btn:active { background: #f0f0f0; }
  .icon-btn.del:active { color: #E24B4A; }
  .icon-btn.save { color: #1D9E75; }

  /* 추가 입력 */
  .add-row {
    margin: 0.75rem 1rem 0;
    display: flex; gap: 8px;
  }
  .add-input {
    flex: 1; font-size: 15px; padding: 12px 14px;
    border: 1px solid #e0e0e0; border-radius: 12px;
    background: #fff; color: #1a1a1a; font-family: inherit;
    outline: none; -webkit-appearance: none;
  }
  .add-input:focus { border-color: #1D9E75; }
  .add-input::placeholder { color: #bbb; }
  .add-btn {
    padding: 12px 18px; border: 1px solid #e0e0e0; border-radius: 12px;
    background: #fff; font-size: 15px; font-family: inherit;
    color: #1a1a1a; cursor: pointer; white-space: nowrap; font-weight: 500;
  }
  .add-btn:active { background: #f5f5f0; }

  /* 알림 설정 */
  .section-card {
    margin: 0.75rem 1rem 0;
    background: #fff; border-radius: 16px; border: 1px solid #eee;
    overflow: hidden;
  }
  .section-card-header {
    padding: 14px 16px 0;
    font-size: 13px; font-weight: 500; color: #888;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .setting-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid #f0f0f0;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { flex: 1; font-size: 15px; color: #1a1a1a; }
  .setting-sub { font-size: 12px; color: #aaa; margin-top: 1px; }
  .time-input {
    font-size: 15px; font-family: inherit; color: #1a1a1a;
    border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 6px 10px; background: #fff;
    outline: none; -webkit-appearance: none;
  }
  .time-input:focus { border-color: #1D9E75; }

  .notif-btn {
    width: 100%; padding: 14px;
    border: none; border-radius: 0;
    background: #1D9E75; color: #fff;
    font-size: 15px; font-family: inherit; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .notif-btn:active { background: #0F6E56; }
  .notif-btn.granted { background: #f5f5f0; color: #1D9E75; border-top: 1px solid #eee; }

  .reset-row {
    display: flex; justify-content: space-between; align-items: center;
    margin: 0.75rem 1rem 0; padding: 0 4px;
  }
  .reset-info { font-size: 12px; color: #bbb; }
  .reset-btn {
    font-size: 12px; color: #bbb; border: none; background: none;
    cursor: pointer; padding: 6px 10px; border-radius: 8px; font-family: inherit;
  }
  .reset-btn:active { background: #eee; }

  /* 동기화 상태 배지 */
  .sync-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    font-weight: 500; transition: opacity 0.3s; white-space: nowrap;
  }
  .sync-badge:empty { display: none; }
  .sync-badge.saving { background: #f0f0f0; color: #888; }
  .sync-badge.saved  { background: #E1F5EE; color: #0F6E56; }
  .sync-badge.error  { background: #FEE2E2; color: #c0392b; }
</style>
</head>
<body>

<div class="safe-top"></div>
<div class="header">
  <div class="date-label" id="dateLabel"></div>
  <div class="header-row">
    <div class="page-title">꾸준함</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sync-badge" id="syncBadge"></span>
      <button class="refresh-btn" onclick="location.reload(true)" title="새로고침">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M15.5 9A6.5 6.5 0 1 1 9 2.5c1.8 0 3.4.73 4.6 1.9L12 6h4V2l-1.4 1.4A8 8 0 1 0 17 9h-1.5z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="streak-card">
  <div class="streak-left">🔥</div>
  <div>
    <div class="streak-num" id="streakNum">0</div>
    <div class="streak-label">일간 꾸준하였습니다</div>
    <div class="streak-sub" id="streakSub"></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-header">
    <span class="progress-title">진행률</span>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="done-banner" id="doneBanner">오늘 루틴 완료! 💪 내일도 이어가요</div>

<div class="checklist" id="checklist"></div>

<div class="add-row">
  <input class="add-input" id="addInput" type="text" placeholder="새 항목 추가..." maxlength="60" />
  <button class="add-btn" id="addBtn">추가</button>
</div>

<!-- 알림 설정 -->
<div class="section-card">
  <div class="section-card-header">알림 설정</div>
  <div class="setting-row">
    <div>
      <div class="setting-label">아침 알림</div>
      <div class="setting-sub">루틴 시작 알림</div>
    </div>
    <input class="time-input" type="time" id="morningTime" value="08:00" />
  </div>
  <div class="setting-row">
    <div>
      <div class="setting-label">저녁 알림</div>
      <div class="setting-sub">미완료 항목 리마인드</div>
    </div>
    <input class="time-input" type="time" id="eveningTime" value="21:00" />
  </div>
  <button class="notif-btn" id="notifBtn" onclick="requestNotif()">알림 허용하기</button>
</div>

<div class="reset-row">
  <span class="reset-info" id="resetInfo"></span>
  <button class="reset-btn" onclick="manualReset()">오늘 초기화</button>
</div>

<script>
// ──────────────────────────────
// Supabase 설정
// ──────────────────────────────
const SUPABASE_URL = 'https://eowmbesmcvonpekagubc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvd21iZXNtY3ZvbnBla2FndWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzYzMTUsImV4cCI6MjA5MTcxMjMxNX0.cXCpeVtn4IiaFxT3g7wdoYOTgiDUizOyfbCycGPlylI';
const USER_ID = 'user_1';
const LEGACY_STORE = 'daily_routine_v2'; // 마이그레이션 소스
const CACHE_STORE  = 'routine_cache_v1'; // 오프라인 캐시

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let S = {};
let TODAY = '';

function getToday() { return new Date().toISOString().slice(0,10); }

// ──────────────────────────────
// 동기화 상태 배지
// ──────────────────────────────
let savedTimer = null;
function setSyncStatus(status) {
  const badge = document.getElementById('syncBadge');
  clearTimeout(savedTimer);
  badge.className = 'sync-badge ' + status;
  if (status === 'saving') { badge.textContent = '저장 중'; }
  else if (status === 'saved') {
    badge.textContent = '저장됨';
    savedTimer = setTimeout(() => { badge.className = 'sync-badge'; badge.textContent = ''; }, 2000);
  } else if (status === 'error') { badge.textContent = '저장 실패'; }
  else { badge.textContent = ''; }
}

// ──────────────────────────────
// 데이터 변환 헬퍼
// ──────────────────────────────
function defaultData() {
  return {
    items: [
      { id:1, text:'아침 30분 걷기' },
      { id:2, text:'물 2리터 마시기' },
      { id:3, text:'독서 20분' },
    ],
    checks: {}, lastDate: null, streak: 0, nextId: 4,
    morningTime: '08:00', eveningTime: '21:00', notifGranted: false
  };
}

function toRow(s) {
  return {
    id: USER_ID,
    items: s.items,
    checks: s.checks,
    streak: s.streak || 0,
    last_date: s.lastDate || null,
    next_id: s.nextId || 1,
    morning_time: s.morningTime || '08:00',
    evening_time: s.eveningTime || '21:00',
    updated_at: new Date().toISOString()
  };
}

function fromRow(row) {
  return {
    items: row.items || [],
    checks: row.checks || {},
    lastDate: row.last_date || null,
    streak: row.streak || 0,
    nextId: row.next_id || 1,
    morningTime: row.morning_time || '08:00',
    eveningTime: row.evening_time || '21:00',
    notifGranted: false
  };
}

function saveCache(s) {
  try { localStorage.setItem(CACHE_STORE, JSON.stringify(s)); } catch(e) {}
}
function loadCache() {
  try { const r = localStorage.getItem(CACHE_STORE); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}

// ──────────────────────────────
// 데이터 로드 (Supabase + fallback)
// ──────────────────────────────
async function loadData() {
  // 1. 기존 localStorage 마이그레이션
  const legacy = localStorage.getItem(LEGACY_STORE);
  if (legacy) {
    try {
      const parsed = JSON.parse(legacy);
      await sb.from('routine_data').upsert(toRow(parsed));
      localStorage.removeItem(LEGACY_STORE);
      saveCache(parsed);
      return parsed;
    } catch(e) {
      return JSON.parse(legacy);
    }
  }

  // 2. Supabase에서 로드
  try {
    const { data, error } = await sb.from('routine_data').select('*').eq('id', USER_ID).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data) { const s = fromRow(data); saveCache(s); return s; }
  } catch(e) {
    console.warn('Supabase load failed, using cache:', e);
  }

  // 3. 오프라인 캐시 fallback
  const cached = loadCache();
  if (cached) return cached;

  // 4. 기본값
  return defaultData();
}

// ──────────────────────────────
// 저장 (캐시 즉시 + Supabase async)
// ──────────────────────────────
async function save() {
  saveCache(S);
  if (!navigator.onLine) return;
  setSyncStatus('saving');
  try {
    const { error } = await sb.from('routine_data').upsert(toRow(S));
    if (error) throw error;
    setSyncStatus('saved');
  } catch(e) {
    console.error('Supabase save failed:', e);
    setSyncStatus('error');
  }
}

// 온라인 복귀 시 동기화
window.addEventListener('online', async () => {
  setSyncStatus('saving');
  try {
    const { error } = await sb.from('routine_data').upsert(toRow(S));
    if (error) throw error;
    setSyncStatus('saved');
  } catch(e) { setSyncStatus('error'); }
});

function maybeReset() {
  const today = getToday();
  if (S.lastDate && S.lastDate !== today) {
    const yest = new Date(today); yest.setDate(yest.getDate()-1);
    const yStr = yest.toISOString().slice(0,10);
    const prevChecks = S.checks[S.lastDate] || {};
    const allDoneYest = S.items.length > 0 && S.items.every(i => prevChecks[i.id]);
    if (S.lastDate === yStr && allDoneYest) S.streak = (S.streak||0) + 1;
    else if (S.lastDate !== yStr) S.streak = 0;
    if (!S.checks[today]) S.checks[today] = {};
  }
  if (!S.lastDate) S.checks[today] = S.checks[today] || {};
  S.lastDate = today;
  save();
}

function todayDone() { return (S.checks[TODAY]||{}); }
function isAllDone() { return S.items.length>0 && S.items.every(i=>todayDone()[i.id]); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const done = S.items.filter(i=>todayDone()[i.id]).length;
  const total = S.items.length;
  const pct = total>0 ? Math.round(done/total*100) : 0;

  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct+'%';

  const allDone = isAllDone();
  document.getElementById('doneBanner').style.display = allDone ? 'block' : 'none';

  let streak = S.streak||0;
  document.getElementById('streakNum').textContent = streak;
  const sub = document.getElementById('streakSub');
  if (allDone && streak > 0) sub.textContent = `${streak}일째 연속 달성 중!`;
  else if (allDone) sub.textContent = '오늘 완료! 내일도 이어가면 스트릭 시작';
  else if (streak > 0) sub.textContent = `어제까지 ${streak}일 — 오늘도 완료하면 유지돼요`;
  else sub.textContent = '';

  const now = new Date();
  document.getElementById('dateLabel').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${['일','월','화','수','목','금','토'][now.getDay()]}요일`;
  document.getElementById('resetInfo').textContent = `매일 자정 자동 초기화`;

  const cl = document.getElementById('checklist');
  cl.innerHTML = '';
  if (S.items.length === 0) {
    cl.innerHTML = '<div style="padding:20px;text-align:center;font-size:14px;color:#bbb">항목을 추가해보세요</div>';
    return;
  }
  S.items.forEach(item => {
    const checked = !!todayDone()[item.id];
    const div = document.createElement('div');
    div.className = 'check-item' + (checked?' checked':'');
    div.dataset.id = item.id;
    div.innerHTML = `
      <div class="drag-handle" data-id="${item.id}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="4" cy="3" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="7" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="11" r="1.2" fill="currentColor"/>
          <circle cx="10" cy="3" r="1.2" fill="currentColor"/>
          <circle cx="10" cy="7" r="1.2" fill="currentColor"/>
          <circle cx="10" cy="11" r="1.2" fill="currentColor"/>
        </svg>
      </div>
      <div class="checkbox">
        <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="item-text">${esc(item.text)}</span>
      <div class="item-actions">
        <button class="icon-btn edit-btn" data-id="${item.id}" onclick="event.stopPropagation()">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn del del-btn" data-id="${item.id}" onclick="event.stopPropagation()">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M6 7v4M8 7v4M3 4l1 8h6l1-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    div.addEventListener('click', () => toggle(item.id));
    div.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); startEdit(item.id); });
    div.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); deleteItem(item.id); });
    const handle = div.querySelector('.drag-handle');
    handle.addEventListener('touchstart', onHandleTouchStart, { passive: false });
    handle.addEventListener('mousedown', onHandleMouseDown);
    cl.appendChild(div);
  });

  document.getElementById('morningTime').value = S.morningTime||'08:00';
  document.getElementById('eveningTime').value = S.eveningTime||'21:00';
  updateNotifBtn();
  scheduleLocalNotifs();
}

function toggle(id) {
  if (!S.checks[TODAY]) S.checks[TODAY] = {};
  if (S.checks[TODAY][id]) delete S.checks[TODAY][id];
  else S.checks[TODAY][id] = true;
  save(); render();
}

function startEdit(id) {
  const item = S.items.find(i=>i.id===id); if(!item) return;
  document.querySelectorAll('.check-item').forEach(row => {
    if (parseInt(row.dataset.id)===id) {
      row.classList.add('editing');
      const textEl = row.querySelector('.item-text');
      textEl.outerHTML = `<input class="item-edit-input" value="${esc(item.text)}" maxlength="60" />`;
      const inp = row.querySelector('.item-edit-input');
      const actions = row.querySelector('.item-actions');
      actions.innerHTML = `
        <button class="icon-btn save" onclick="event.stopPropagation()">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 4L12 3" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" onclick="event.stopPropagation()">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>`;
      actions.children[0].addEventListener('click', e => { e.stopPropagation(); doSaveEdit(id, inp.value); });
      actions.children[1].addEventListener('click', e => { e.stopPropagation(); render(); });
      inp.focus(); inp.select();
      inp.addEventListener('keydown', e => {
        if(e.key==='Enter') doSaveEdit(id, inp.value);
        if(e.key==='Escape') render();
      });
      row.onclick = null;
    }
  });
}

function doSaveEdit(id, v) {
  const t = v.trim(); if(!t) return;
  const item = S.items.find(i=>i.id===id); if(item) item.text=t;
  save(); render();
}

function deleteItem(id) {
  S.items = S.items.filter(i=>i.id!==id); save(); render();
}

document.getElementById('addBtn').addEventListener('click', addItem);
document.getElementById('addInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
function addItem() {
  const inp = document.getElementById('addInput');
  const t = inp.value.trim(); if(!t) return;
  S.items.push({id: S.nextId++, text: t});
  inp.value=''; save(); render();
}

function manualReset() {
  if(confirm('오늘 체크를 모두 초기화할까요?')) {
    S.checks[TODAY]={}; save(); render();
  }
}

// ──────────────────────────────
// 알림 관련
// ──────────────────────────────
function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!('Notification' in window)) {
    btn.textContent = '이 브라우저는 알림을 지원하지 않아요';
    btn.disabled = true; return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent = '알림이 설정됐어요 ✓';
    btn.classList.add('granted');
  } else if (Notification.permission === 'denied') {
    btn.textContent = '알림이 차단됐어요 — 설정에서 허용해주세요';
    btn.classList.add('granted');
  } else {
    btn.textContent = '알림 허용하기';
    btn.classList.remove('granted');
  }
}

async function requestNotif() {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  S.notifGranted = perm === 'granted';
  save();
  updateNotifBtn();
  if (perm === 'granted') scheduleLocalNotifs();
}

// 시간 저장
document.getElementById('morningTime').addEventListener('change', e => {
  S.morningTime = e.target.value; save(); scheduleLocalNotifs();
});
document.getElementById('eveningTime').addEventListener('change', e => {
  S.eveningTime = e.target.value; save(); scheduleLocalNotifs();
});

// Local Notification 스케줄 (서비스워커 경유)
function scheduleLocalNotifs() {
  if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') return;
  navigator.serviceWorker.ready.then(reg => {
    reg.active && reg.active.postMessage({
      type: 'SCHEDULE',
      morningTime: S.morningTime || '08:00',
      eveningTime: S.eveningTime || '21:00',
      streak: S.streak || 0,
    });
  });
}

// 서비스워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(() => {
    scheduleLocalNotifs();
  });
}

// ──────────────────────────────
// 드래그 순서 변경
// ──────────────────────────────
let dragState = null;

function onHandleTouchStart(e) {
  e.preventDefault();
  e.stopPropagation();
  const touch = e.touches[0];
  initDrag(e.currentTarget.closest('.check-item'), touch.clientX, touch.clientY, 'touch');
}

function onHandleMouseDown(e) {
  if (e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();
  initDrag(e.currentTarget.closest('.check-item'), e.clientX, e.clientY, 'mouse');
}

function initDrag(row, x, y, type) {
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;
    opacity:0.85;pointer-events:none;z-index:1000;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);border-radius:12px;background:#fff;`;
  document.body.appendChild(ghost);
  row.classList.add('dragging');
  dragState = { id: parseInt(row.dataset.id), ghost, offsetY: y - rect.top, row, type };
  if (type === 'touch') {
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend', onDragEnd);
  } else {
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const y = dragState.type === 'touch' ? e.touches[0].clientY : e.clientY;
  dragState.ghost.style.top = (y - dragState.offsetY) + 'px';
  const cl = document.getElementById('checklist');
  cl.querySelectorAll('.check-item').forEach(r => {
    r.classList.remove('drag-over');
    if (parseInt(r.dataset.id) !== dragState.id) {
      const rect = r.getBoundingClientRect();
      if (y >= rect.top && y <= rect.bottom) r.classList.add('drag-over');
    }
  });
}

function onDragEnd(e) {
  if (!dragState) return;
  const y = dragState.type === 'touch'
    ? (e.changedTouches ? e.changedTouches[0].clientY : 0)
    : e.clientY;
  const cl = document.getElementById('checklist');
  const target = [...cl.querySelectorAll('.check-item')].find(r => {
    if (parseInt(r.dataset.id) === dragState.id) return false;
    const rect = r.getBoundingClientRect();
    return y >= rect.top && y <= rect.bottom;
  });
  if (target) {
    const srcIdx = S.items.findIndex(i => i.id === dragState.id);
    const dstIdx = S.items.findIndex(i => i.id === parseInt(target.dataset.id));
    if (srcIdx !== dstIdx) {
      const [removed] = S.items.splice(srcIdx, 1);
      S.items.splice(dstIdx, 0, removed);
      save();
    }
  }
  dragState.ghost.remove();
  dragState.row.classList.remove('dragging');
  cl.querySelectorAll('.check-item').forEach(r => r.classList.remove('drag-over'));
  if (dragState.type === 'touch') {
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);
  } else {
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
  }
  dragState = null;
  render();
}

// ──────────────────────────────
// 앱 초기화
// ──────────────────────────────
async function init() {
  S = await loadData();
  TODAY = getToday();
  if (!S.checks[TODAY]) S.checks[TODAY] = {};
  maybeReset();
  render();
  setInterval(() => { maybeReset(); render(); }, 60000);
}

init();
</script>
